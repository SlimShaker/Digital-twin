version: "3.8"
services:
  broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"

  home:
    build:
      context: .
      dockerfile: ./edge/home/Dockerfile
    depends_on:
      - broker
    restart: always

  mobile:
    build:
      context: .
      dockerfile: ./edge/mobile/Dockerfile
    depends_on:
      - broker
    restart: always

  work:
    build:
      context: .
      dockerfile: ./edge/work/Dockerfile
    depends_on:
      - broker
    restart: always

  fog_one:
    volumes:
      - ./data:/app/data
    build:
      context: .
      dockerfile: ./fog/fog1/Dockerfile
    depends_on:
      - broker
    restart: always

  fog_one_broker:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  fog_two:
    volumes:
      - ./data:/app/data
    build:
      context: .
      dockerfile: ./fog/fog2/Dockerfile
    depends_on:
      - broker
    restart: always

  fog_two_broker:
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf