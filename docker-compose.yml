version: "3.8"
services:
  #-----cloud------
  cloud_broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"

  cloud:
    build:
      context: .
      dockerfile: ./cloud/Dockerfile
    depends_on:
      - cloud_broker
    volumes:
      - ./data:/app/data
 #-------------fog----------------
  smart_router_broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1884:1883"

  smart_router:
    build:
      context: .
      dockerfile: ./fog/Dockerfile
    depends_on:
      - smart_router_broker
    environment:
      - FOG_NODE=smart_router
      - BROKER=tcp://smart_router_broker:1883
    volumes:
      - ./data:/app/data

  local_server_broker:
    image: eclipse-mosquitto:latest
    ports:
      - "1885:1883"

  local_server:
    build:
      context: .
      dockerfile: ./fog/Dockerfile
    depends_on:
      - local_server_broker
    environment:
      - FOG_NODE=local_server
      - BROKER=tcp://local_server_broker:1883
    volumes:
      - ./data:/app/data
#------------edges---------
  edge_home:
    build:
      context: .
      dockerfile: ./edge/Dockerfile
    environment:
      - EDGE_TYPE=home
      - TOPIC=human/home
    depends_on:
      - cloud_broker
      - smart_router
      - local_server

  edge_mobile:
    build:
      context: .
      dockerfile: ./edge/Dockerfile
    environment:
      - EDGE_TYPE=mobile
      - TOPIC=human/mobile
    depends_on:
      - cloud_broker
      - smart_router
      - local_server

  edge_work:
    build:
      context: .
      dockerfile: ./edge/Dockerfile
    environment:
      - EDGE_TYPE=work
      - TOPIC=human/work
    depends_on:
      - cloud_broker
      - smart_router
      - local_server
#-------twin--------
  twin:
    build:
      context: .
      dockerfile: ./fog/Dockerfile
    depends_on:
      - smart_router
    environment:
      - ACTIVE_NODE=fog_one
    volumes:
      - ./data:/app/data