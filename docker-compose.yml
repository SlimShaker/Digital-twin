version: "3.8"
services:
  broker:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"

  edge:
    build:
      context: .
      dockerfile: edge/Dockerfile
    depends_on:
      - broker
    restart: always
  fog:
    volumes:
      - ./data:/app/data
    build:
      context: .
      dockerfile: fog/Dockerfile
    depends_on:
      - broker
    restart: always